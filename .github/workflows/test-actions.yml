name: Action Integration Tests
on:
  workflow_dispatch:
  pull_request:
    paths: ['.github/actions/**', '.github/workflows/test-actions.yml']
jobs:
  setup-node:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node
        with:
          env-vars: TEST_KEY=test-value
  build-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/build-contracts
        with:
          cargo-command: fmt --check
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/run-tests
        with:
          test-command: npm run test -- --passWithNoTests
          upload-coverage: 'false'
          upload-junit: 'false'
  deploy-service:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/deploy-service
        with:
          image-name: example/app
          registry-username: test
          registry-password: test
