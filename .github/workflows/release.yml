name: Release
on:
  workflow_run:
    workflows: ['CI/CD Pipeline']
    types: [completed]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deployment target (canary|prod|rollback)'
        required: true
        default: 'canary'
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  release:
    uses: ./.github/workflows/release-core.yml
    secrets: inherit
