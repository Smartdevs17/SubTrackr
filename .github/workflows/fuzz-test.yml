name: Cargo-Fuzz Pipeline
on:
  push:
    branches: [main, develop]
    paths: ['contracts/subscription/**', 'contracts/fuzz/**', '.github/workflows/fuzz-test.yml', '.github/corpus/**']
  pull_request:
    branches: [main, develop]
    paths: ['contracts/subscription/**', 'contracts/fuzz/**', '.github/workflows/fuzz-test.yml']
  schedule:
    - cron: '0 6 * * 1'
jobs:
  fuzz:
    uses: ./.github/workflows/fuzz-core.yml
    secrets: inherit
