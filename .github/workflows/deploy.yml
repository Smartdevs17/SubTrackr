name: Deployment Pipeline
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options: [development, staging, production]
jobs:
  deploy:
    uses: ./.github/workflows/deploy-core.yml
    secrets: inherit
