name: CI Core

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: '20'
      rust-version:
        required: false
        type: string
        default: '1.88'

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node
        with:
          fetch-depth: '0'
          node-version: ${{ inputs.node-version }}
      - run: npx commitlint --from=origin/${{ github.event.pull_request.base.ref }} --to=HEAD --verbose

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
      - run: npm run format:check
      - run: npm run lint

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
      - run: npx audit-ci --config audit-ci.json

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
      - run: npm run contracts:codegen:check
      - run: npx tsc --noEmit
      - run: npm run performance:ci

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
      - run: npm run test:shard
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.shard }}
          path: coverage/lcov.info

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
      - run: npm run build

  sonarcloud:
    runs-on: ubuntu-latest
    needs: [tests]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report-1
          path: coverage
      - uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-contracts
        with:
          rust-version: ${{ inputs.rust-version }}
          cargo-command: fmt --check
