name: CI/CD Pipeline

on:
  push:
    branches: [main, dev, develop, 'feature/*']
  pull_request:
    branches: [main, dev, develop, 'feature/*']

env:
  NODE_VERSION: '20'
  RUST_VERSION: '1.85'

jobs:
  commitlint:
    name: Conventional Commit Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.sha }} --verbose

  # ─────────────────────────────────────────────────────────
  # TypeScript / React Native Checks
  # ─────────────────────────────────────────────────────────
  typescript-lint:
    name: TypeScript Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Check formatting (Prettier)
        id: prettier-check
        run: npm run format:check
        continue-on-error: true

      - name: Auto-fix formatting issues
        if: steps.prettier-check.outcome == 'failure'
        run: |
          echo "Formatting inconsistencies detected. Executing auto-fixer..."
          npm run format:write || npx prettier --write "src/**/*.{ts,tsx,js,json,md}"

      - name: Commit and Push formatting fixes
        if: steps.prettier-check.outcome == 'failure'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: automated code formatting fixes via CI pipeline'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Enforce strict layout check
        if: steps.prettier-check.outcome == 'failure'
        run: |
          echo "❌ Code styles were inconsistent. Automated modifications have been pushed to your branch."
          echo "Please pull latest changes locally or wait for the subsequent workflow run execution pass."
          exit 1

      - name: Run ESLint
        run: npm run lint

  npm-audit:
    name: NPM Audit (High/Critical)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run NPM Audit
        run: npx audit-ci --config audit-ci.json

  typescript-typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: EVM ABI TypeChain (must match committed output)
        run: npm run contracts:codegen:check

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Validate performance budgets
        run: npm run performance:ci

  typescript-tests:
    name: TypeScript Tests (Sharded)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3]
    env:
      SHARD: ${{ matrix.shard }}
      SHARD_COUNT: 3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Run sharded tests with coverage
        run: |
          echo "Running shard $SHARD of $SHARD_COUNT"
          npm run test:shard

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.shard }}
          path: coverage/lcov.info

  typescript-build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}

      - name: Cache Expo build cache
        uses: actions/cache@v4
        with:
          path: |
            .expo
            node_modules/.cache/expo
          key: ${{ runner.os }}-expo-${{ hashFiles('package.json', 'app.json') }}
          restore-keys: |
            ${{ runner.os }}-expo-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Run Expo export
        run: npm run build
        env:
          EXPO_NO_TELEMETRY: 1

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [typescript-tests]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────────────────
  # Rust / Soroban Smart Contract Checks
  # ─────────────────────────────────────────────────────────
  rust-format:
    name: Rust Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - name: Check Rust formatting
        run: cd contracts && cargo fmt --check

  rust-clippy:
    name: Rust Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Cache Rust dependencies and target
        uses: actions/cache@v4
        with:
          path: |
            ~/cargo/registry/index/
            ~/cargo/registry/cache/
            ~/cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-

      - name: Run Clippy
        working-directory: ./contracts
        run: cargo clippy --all-targets -- -D warnings

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust dependencies and target
        uses: actions/cache@v4
        with:
          path: |
            ~/cargo/registry/index/
            ~/cargo/registry/cache/
            ~/cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-

      - name: Run Rust tests
        working-directory: ./contracts
        run: cargo test --verbose

  rust-build:
    name: Rust Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust dependencies and target
        uses: actions/cache@v4
        with:
          path: |
            ~/cargo/registry/index/
            ~/cargo/registry/cache/
            ~/cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-

      - name: Build Rust contracts
        working-directory: ./contracts
        run: cargo build --release

  # ─────────────────────────────────────────────────────────
  # Load Testing
  # ─────────────────────────────────────────────────────────
  load-test:
    name: k6 Load Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: [subscription, billing, contract]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare reports directory
        run: mkdir -p load-tests/reports

      # k6 exits non-zero when a threshold in config/options.js is breached,
      # which fails this job — that is the CI gate on performance regressions.
      - name: Run k6 Load Test (${{ matrix.scenario }})
        uses: grafana/k6-action@v0.5.1
        with:
          filename: load-tests/run.js
          flags: --env SCENARIO=${{ matrix.scenario }} --quiet

      - name: Rename report for this scenario
        if: always()
        run: |
          for ext in json md html; do
            if [ -f "load-tests/reports/summary.$ext" ]; then
              mv "load-tests/reports/summary.$ext" "load-tests/reports/${{ matrix.scenario }}.$ext"
            fi
          done

      - name: Upload load test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report-${{ matrix.scenario }}
          path: load-tests/reports/
          if-no-files-found: ignore

 # ─────────────────────────────────────────────────────────
  # Bundle Size Monitoring
  # ─────────────────────────────────────────────────────────
  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    env:
      EXPO_NO_TELEMETRY: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check bundle size (PR)
        if: github.event_name == 'pull_request'
        uses: andresz1/size-limit-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build_script: 'npm run build'
          install_script: 'true'  # 👈 BYPASS INTERNAL LOCKS AND USE PRE-INSTALLED PEER DEPS

      - name: Build app
        if: github.event_name != 'pull_request'
        run: npm run build

      - name: Check bundle size (Push)
        if: github.event_name != 'pull_request'
        run: npx size-limit --json > bundle-size-report.json

      - name: Upload bundle size report
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report-${{ github.sha }}
          path: bundle-size-report.json