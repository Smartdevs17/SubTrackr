name: CI/CD Pipeline

on:
  push:
    branches: [main, dev, develop, 'feature/*']
  pull_request:
    branches: [main, dev, develop, 'feature/*']

env:
  NODE_VERSION: '20'
  RUST_VERSION: '1.85'

jobs:
  changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.filter.outputs.typescript }}
      rust: ${{ steps.filter.outputs.rust }}
      load_tests: ${{ steps.filter.outputs.load_tests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            typescript:
              - 'src/**'
              - 'app/**'
              - 'backend/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'jest.config.js'
              - 'App.tsx'
              - 'index.ts'
            rust:
              - 'contracts/**'
            load_tests:
              - 'load-tests/**'

  commitlint:
    name: Conventional Commit Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.sha }} --verbose

  # ─────────────────────────────────────────────────────────
  # TypeScript / React Native Checks
  # ─────────────────────────────────────────────────────────
  typescript-lint:
    name: TypeScript Lint & Format
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

  typescript-typecheck:
    name: TypeScript Type Check
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: EVM ABI TypeChain (must match committed output)
        run: npm run contracts:codegen:check

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  typescript-tests:
    name: TypeScript Tests (Sharded)
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3]
    env:
      SHARD: ${{ matrix.shard }}
      SHARD_COUNT: 3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run sharded tests with coverage
        run: |
          echo "Running shard $SHARD of $SHARD_COUNT"
          npm run test:shard -- --shard=${{ matrix.shard }}/${{ env.SHARD_COUNT }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.shard }}
          path: coverage/lcov.info

  typescript-build:
    name: TypeScript Build
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Expo export
        run: npm run build
        env:
          EXPO_NO_TELEMETRY: 1

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [typescript-tests]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-report-*
          path: coverage
          merge-multiple: false

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────────────────
  # Rust / Soroban Smart Contract Checks
  # ─────────────────────────────────────────────────────────
  rust-format:
    name: Rust Format Check
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - name: Check Rust formatting
        run: cd contracts && cargo fmt --check

  rust-clippy:
    name: Rust Clippy Lint
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './contracts -> target'

      - name: Run Clippy
        working-directory: ./contracts
        run: cargo clippy --all-targets -- -D warnings

  rust-tests:
    name: Rust Tests
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './contracts -> target'

      - name: Run Rust tests
        working-directory: ./contracts
        run: cargo test --verbose

  rust-build:
    name: Rust Build
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './contracts -> target'

      - name: Build Rust contracts
        working-directory: ./contracts
        run: cargo build --release

  # ─────────────────────────────────────────────────────────
  # Load Testing
  # ─────────────────────────────────────────────────────────
  load-test:
    name: k6 Load Test
    needs: changes
    if: needs.changes.outputs.load_tests == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run k6 Load Test
        uses: grafana/k6-action@v0.5.0
        with:
          filename: load-tests/run.js
          flags: --env SCENARIO=subscription

  # ─────────────────────────────────────────────────────────
  # Merge Protection (only on PRs)
  # ─────────────────────────────────────────────────────────
  merge-protection:
    name: Merge Protection Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs:
      [
        changes,
        commitlint,
        typescript-lint,
        typescript-typecheck,
        typescript-tests,
        typescript-build,
        sonarcloud,
        rust-format,
        rust-clippy,
        rust-tests,
        rust-build,
        load-test,
      ]
    steps:
      - name: All checks passed
        run: echo "All quality gates passed!"

  # ─────────────────────────────────────────────────────────
  # Full CI Summary (runs after all jobs)
  # ─────────────────────────────────────────────────────────
  ci-success:
    name: CI Complete
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        changes,
        commitlint,
        typescript-lint,
        typescript-typecheck,
        typescript-tests,
        typescript-build,
        sonarcloud,
        rust-format,
        rust-clippy,
        rust-tests,
        rust-build,
        load-test,
      ]
    steps:
      - name: Check for failures
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ needs.commitlint.result }}" != "success" ] && [ "${{ needs.commitlint.result }}" != "skipped" ]; then
            echo "Conventional commit check failed"
            exit 1
          fi
          if [ "${{ needs.typescript-lint.result }}" != "success" ] && [ "${{ needs.typescript-lint.result }}" != "skipped" ] || \
             [ "${{ needs.typescript-typecheck.result }}" != "success" ] && [ "${{ needs.typescript-typecheck.result }}" != "skipped" ] || \
             [ "${{ needs.typescript-tests.result }}" != "success" ] && [ "${{ needs.typescript-tests.result }}" != "skipped" ] || \
             [ "${{ needs.typescript-build.result }}" != "success" ] && [ "${{ needs.typescript-build.result }}" != "skipped" ] || \
             [ "${{ needs.sonarcloud.result }}" != "success" ] && [ "${{ needs.sonarcloud.result }}" != "skipped" ] || \
             [ "${{ needs.rust-format.result }}" != "success" ] && [ "${{ needs.rust-format.result }}" != "skipped" ] || \
             [ "${{ needs.rust-clippy.result }}" != "success" ] && [ "${{ needs.rust-clippy.result }}" != "skipped" ] || \
             [ "${{ needs.rust-tests.result }}" != "success" ] && [ "${{ needs.rust-tests.result }}" != "skipped" ] || \
             [ "${{ needs.rust-build.result }}" != "success" ] && [ "${{ needs.rust-build.result }}" != "skipped" ] || \
             [ "${{ needs.load-test.result }}" != "success" ] && [ "${{ needs.load-test.result }}" != "skipped" ]; then
            echo "One or more CI checks failed"
            exit 1
          fi
          echo "All CI checks passed (or were skipped) successfully!"
