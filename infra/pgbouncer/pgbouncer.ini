# PgBouncer configuration for SubTrackr read replicas.
# Mount into pgbouncer-replica-* containers in docker-compose.
#
# Pool mode: transaction (suitable for read-heavy analytics workloads)
# Default pool size: 25 (matches DB_REPLICA_POOL_SIZE)

[databases]
* = host=__PGBOUNCER_DB_HOST__ port=5432 dbname=subtrackr

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
max_client_conn = 200
server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits
